# Example of workflow trigger for calling workflow (the client).
name: ci-dev
on:
  pull_request:
    branches: ["dev"]
  push:
    branches: ["dev"]
jobs:
  ci:
    uses: lizgehret/distributions/.github/workflows/lib-ci-dev.yaml@dev
    with:
      distro: tiny
      recipe-path: 'conda-recipe'
      validate-pr-template: false
